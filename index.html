<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- TÍTULO DE LA PÁGINA (Máximo 60 caracteres - Clave para SEO) -->
    <title>Máquinas para Congelados | Equipamiento Industrial de Alta Calidad</title>
    
    <!-- META DESCRIPCIÓN (Aparece en los resultados de Google - Máximo 155 caracteres) -->
    <meta name="description" content="Descubre nuestra gama de máquinas para congelados industriales. Equipos de refrigeración comercial de alta eficiencia para tu negocio. ¡Cotiza hoy mismo!" />
    
    <!-- PALABRAS CLAVE (Ayuda de contexto secundario) -->
    <meta name="keywords" content="maquinas para congelados, congeladores industriales, refrigeracion comercial, equipo para congelados, vitrinas congeladoras" />
    
    <!-- META ETIQUETAS OPEN GRAPH (Para mejorar cómo se comparte en redes sociales) -->
    <meta property="og:title" content="Máquinas para Congelados Industriales y Comerciales" />
    <meta property="og:description" content="Equipamiento avanzado en refrigeración y conservación de congelados. Calidad garantizada." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vercel.app" />
    
    <!-- ETIQUETA CANÓNICA (Evita contenido duplicado en buscadores) -->
    <link rel="canonical" href="https://vercel.app" />
    
    <!-- FAVICON -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <!-- CONTENIDO SEMÁNTICO BASE PARA SEO ANTES DE QUE CARGUE JAVASCRIPT -->
    <header style="display: none;">
      <h1>Venta de Máquinas para Congelados de Alta Eficiencia</h1>
      <h2>Equipos de Refrigeración y Congelación Comercial e Industrial</h2>
    </header>

    <!-- CONTENEDOR PRINCIPAL DONDE SE MONTA TU APP DE REACT -->
    <div id="root"></div>

    <!-- SCRIPT PRINCIPAL DE TU APLICACIÓN VITE -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
